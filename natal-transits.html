<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.45/moment-timezone-with-data.min.js"></script>

<script type="module">

let swe = null;
const SE_SUN = 0, SE_MOON = 1, SE_MERCURY = 2, SE_VENUS = 3, SE_MARS = 4;
const SE_JUPITER = 5, SE_SATURN = 6, SE_URANUS = 7, SE_NEPTUNE = 8, SE_PLUTO = 9;
const SE_TRUE_NODE = 11, SE_MEAN_APOG = 12, SE_CHIRON = 15;
const SEFLG_SPEED = 256, SE_GREG_CAL = 1;

const SE_BODIES = {
  sun: SE_SUN, moon: SE_MOON, mercury: SE_MERCURY, venus: SE_VENUS,
  mars: SE_MARS, jupiter: SE_JUPITER, saturn: SE_SATURN, uranus: SE_URANUS,
  neptune: SE_NEPTUNE, pluto: SE_PLUTO, north_node: SE_TRUE_NODE,
  lilith: SE_MEAN_APOG, chiron: SE_CHIRON
};

const SIGNS = ['Овен','Телец','Близнецы','Рак','Лев','Дева',
               'Весы','Скорпион','Стрелец','Козерог','Водолей','Рыбы'];

const SIGN_SYM = ['a','s','d','f','g','h','j','k','l','z','x','c'];

const PLANET_NAMES = {
  sun:'Солнце', moon:'Луна', mercury:'Меркурий', venus:'Венера',
  mars:'Марс', jupiter:'Юпитер', saturn:'Сатурн', uranus:'Уран',
  neptune:'Нептун', pluto:'Плутон', north_node:'Сев.узел',
  south_node:'Юж.узел', lilith:'Лилит', selena:'Селена',
  chiron:'Хирон', vertex:'Вертекс', pars_fortuna:'Парс Фортуны',
  asc:'AC', mc:'MC',
};

const PLANET_NAMES_FULL = {
  sun:'Солнце', moon:'Луна', mercury:'Меркурий', venus:'Венера',
  mars:'Марс', jupiter:'Юпитер', saturn:'Сатурн', uranus:'Уран',
  neptune:'Нептун', pluto:'Плутон', north_node:'Сев. узел (Раху)',
  south_node:'Юж. узел (Кету)', lilith:'Лилит (Черная Луна)',
  selena:'Селена (Белая Луна)', chiron:'Хирон', vertex:'Вертекс',
  pars_fortuna:'Парс Фортуны', asc:'Асцендент', mc:'Середина Неба',
};

const PLANET_NAMES_INSTR = {
  sun:'Солнцем', moon:'Луной', mercury:'Меркурием', venus:'Венерой',
  mars:'Марсом', jupiter:'Юпитером', saturn:'Сатурном', uranus:'Ураном',
  neptune:'Нептуном', pluto:'Плутоном', north_node:'Сев.узлом',
  south_node:'Юж.узлом', lilith:'Лилит', selena:'Селеной',
  chiron:'Хироном', vertex:'Вертексом', pars_fortuna:'Парсом Фортуны',
  asc:'Асцендентом', mc:'Серединой Неба',
};

const ASPECT_TEXT = {
  'Соединение': 'в соединении с',
  'Полусекстиль': 'в полусекстиле с',
  'Секстиль': 'в секстиле с',
  'Квадратура': 'в квадрате с',
  'Тригон': 'в тригоне с',
  'Квиконс': 'в квиконсе с',
  'Оппозиция': 'в оппозиции с'
};

const PLANET_ORDER = [
  'sun','moon','mercury','venus','mars','jupiter',
  'saturn','uranus','neptune','pluto',
  'north_node','south_node','lilith','selena','chiron'
];

const ASPECT_DEFS = [
  { name: 'Соединение', sym: '☌', angle: 0,   orb: 1 },
  { name: 'Полусекстиль', sym: '⚺', angle: 30, orb: 1 },
  { name: 'Секстиль',   sym: '⚹', angle: 60,  orb: 1 },
  { name: 'Квадратура',  sym: '□', angle: 90,  orb: 1 },
  { name: 'Тригон',      sym: '△', angle: 120, orb: 1 },
  { name: 'Квиконс',     sym: '⚻', angle: 150, orb: 1 },
  { name: 'Оппозиция',   sym: '☍', angle: 180, orb: 1 },
];

// Множитель орба по скорости транзитной планеты
// Медленные получают больший орб, быстрые — стандартный
const ORB_MULTIPLIER = {
  pluto: 1.0, neptune: 1.0, uranus: 1.0,
  chiron: 1.0, saturn: 1.0, jupiter: 1.0,
  mars: 1.0, venus: 1.0, sun: 1.0, mercury: 1.0, moon: 1.0,
  north_node: 1.0, south_node: 1.0, lilith: 1.0, selena: 1.0
};

function norm(d) { let r = d % 360; return r < 0 ? r + 360 : r; }

function degToSign(deg) {
  const d = norm(deg), idx = Math.floor(d / 30), rem = d % 30;
  return { sign: SIGNS[idx], signIndex: idx, degree: Math.floor(rem),
    minute: Math.floor((rem % 1) * 60), second: Math.floor(((rem % 1) * 60 % 1) * 60), absolute: d };
}

function fmtDeg(deg) {
  if (isNaN(deg)) return '—';
  const i = degToSign(deg);
  return `${i.degree}\u00B0${String(i.minute).padStart(2,'0')}'${String(i.second).padStart(2,'0')}" ${i.sign}`;
}

function fmtDegShort(deg) {
  if (isNaN(deg)) return '—';
  const i = degToSign(deg);
  return `${i.degree}\u00B0${String(i.minute).padStart(2,'0')}' ${i.sign}`;
}

function houseOf(deg, cusps) {
  if (!cusps || cusps.length < 12 || isNaN(deg)) return 1;
  const d = norm(deg);
  for (let i = 0; i < 12; i++) {
    const s = cusps[i], e = cusps[(i + 1) % 12];
    if (s > e) { if (d >= s || d < e) return i + 1; }
    else       { if (d >= s && d < e) return i + 1; }
  }
  return 1;
}

function sweJulday(y, m, d, h) { return (swe.julday || swe.swe_julday).call(swe, y, m, d, h, SE_GREG_CAL); }

function sweCalcUt(jd, body) {
  const r = (swe.calc_ut || swe.swe_calc_ut).call(swe, jd, body, SEFLG_SPEED);
  if (r && r.data && Array.isArray(r.data)) return r.data;
  if (r && r.xx) return r.xx;
  if (Array.isArray(r)) return r;
  if (r && r.longitude !== undefined) return [r.longitude, r.latitude||0, r.distance||0, r.longitudeSpeed||0];
  if (r && typeof r === 'object') { const v = Object.values(r).filter(x => typeof x === 'number'); if (v.length >= 4) return v; }
  return [0, 0, 0, 0];
}

function sweHouses(jd, lat, lon) {
  const r = (swe.houses || swe.swe_houses).call(swe, jd, lat, lon, 'P'.charCodeAt(0));
  let cusps = [], ascmc = [];
  if (r) {
    cusps = r.cusps || r.house || r.houses || (r.data && (r.data.houses || r.data.cusps || r.data.house)) || [];
    ascmc = r.ascmc || r.points || (r.data && (r.data.ascmc || r.data.points)) || [];
    if (Array.isArray(r) && r.length === 2) { cusps = r[0]; ascmc = r[1]; }
  }
  if (cusps.length === 13) cusps = cusps.slice(1);
  return { cusps, ascmc };
}

function calcSelena(jd) { return norm(242.606 + 0.14084795 * (jd - 2451545.0)); }

function calcPositions(jd) {
  const pos = {};
  for (const [name, bodyCode] of Object.entries(SE_BODIES)) {
    const data = sweCalcUt(jd, bodyCode);
    pos[name] = { longitude: norm(data[0]), speed: data[3] || 0, retrograde: (data[3] || 0) < 0 };
  }
  if (pos.north_node) {
    pos.north_node.retrograde = true;
    pos.south_node = { longitude: norm(pos.north_node.longitude + 180), retrograde: true, speed: 0 };
  }
  pos.selena = { longitude: calcSelena(jd), retrograde: false, speed: 0 };
  return pos;
}

function calcAllHouses(jd, lat, lon) {
  const { cusps, ascmc } = sweHouses(jd, lat, lon);
  const asc = (ascmc[0] !== undefined && !isNaN(ascmc[0])) ? ascmc[0] : 0;
  const mc = (ascmc[1] !== undefined && !isNaN(ascmc[1])) ? ascmc[1] : 0;
  const vertex = (ascmc[3] !== undefined && !isNaN(ascmc[3])) ? ascmc[3] : 0;
  let fc = cusps;
  if (fc.length < 12 && asc) { fc = []; for (let i = 0; i < 12; i++) fc.push(norm(asc + i * 30)); }
  return { cusps: fc, asc: norm(asc), mc: norm(mc), vertex: norm(vertex) };
}

function localToUTC(year, month, day, hour, minute, tz) {
  const ds = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')} ${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
  const cleanTz = String(tz).trim();
  let loc;
  const isOff = /^[-+]?\d+(\.\d+)?$/.test(cleanTz) || /^[-+]?\d{1,2}:\d{2}$/.test(cleanTz);
  if (isOff) loc = moment(ds, 'YYYY-MM-DD HH:mm').utcOffset(parseFloat(cleanTz), true);
  else loc = moment.tz(ds, 'YYYY-MM-DD HH:mm', cleanTz);
  if (!loc.isValid()) throw new Error('Невалидная дата/пояс');
  const off = loc.utcOffset() / 60;
  let abbr = loc.format('z');
  if (isOff) abbr = 'UTC' + (off >= 0 ? '+' : '') + off;
  const u = loc.clone().utc();
  return { year: u.year(), month: u.month()+1, day: u.date(), hour: u.hour(), minute: u.minute(), second: u.second(), utcOffset: off, tzAbbr: abbr };
}

// ── Кросс-аспекты: транзит → натал, орб зависит от скорости планеты ──
function calcCrossAspects(transitPos, natalPos) {
  const result = [];
  const tKeys = PLANET_ORDER;
  const nKeys = [...PLANET_ORDER, 'vertex', 'pars_fortuna', 'asc', 'mc'];

  for (const tk of tKeys) {
    if (!transitPos[tk] || isNaN(transitPos[tk].longitude)) continue;
    const mult = ORB_MULTIPLIER[tk] || 1.0;
    for (const nk of nKeys) {
      if (!natalPos[nk] || isNaN(natalPos[nk].longitude)) continue;
      let d = Math.abs(transitPos[tk].longitude - natalPos[nk].longitude);
      if (d > 180) d = 360 - d;
      for (const a of ASPECT_DEFS) {
        const effectiveOrb = a.orb * mult;
        const o = Math.abs(d - a.angle);
        if (o <= effectiveOrb) {
          result.push({ transit: tk, natal: nk, type: a.name, sym: a.sym, orb: o.toFixed(2), orbNum: o });
        }
      }
    }
  }
  return result.sort((a, b) => a.orbNum - b.orbNum);
}

// ── РАСЧЁТ ──
window.calc = function() {
  const errEl = document.getElementById('error');
  errEl.textContent = '';
  if (!swe) { errEl.textContent = 'Swiss Ephemeris ещё загружается...'; return; }
  const btn = document.getElementById('calcBtn');
  btn.disabled = true; btn.textContent = 'РАСЧЁТ...';

  try {
    const bDate = document.getElementById('birthDate').value;
    const bTime = document.getElementById('birthTime').value;
    const bLat = parseFloat(document.getElementById('birthLat').value);
    const bLon = parseFloat(document.getElementById('birthLon').value);
    const bTz = document.getElementById('birthTz').value;
    const tDate = document.getElementById('transitDate').value;
    const tTime = document.getElementById('transitTime').value;
    const tTz = document.getElementById('transitTz').value;
    const tLat = parseFloat(document.getElementById('transitLat').value);
    const tLon = parseFloat(document.getElementById('transitLon').value);
    const gender = document.querySelector('input[name="gender"]:checked').value;
    const nameVal = document.getElementById('name').value;
    const birthCityVal = document.getElementById('birthCity').value;
    const transitCityVal = document.getElementById('transitCity').value;

    if (!bDate || !bTime || !bLat || !bLon || !bTz || !tDate) throw new Error('Заполните все поля рождения и дату транзита.');
    if (!tTz) throw new Error('Укажите часовой пояс транзита (выберите город).');

    const [bYear, bMonth, bDay] = bDate.split('-').map(Number);
    const [bHour, bMin] = bTime.split(':').map(Number);
    const [tYear, tMonth, tDay] = tDate.split('-').map(Number);
    const [tHour, tMin] = tTime.split(':').map(Number);

    // ── Натальная карта ──
    const uBirth = localToUTC(bYear, bMonth, bDay, bHour, bMin, bTz);
    const jdBirth = sweJulday(uBirth.year, uBirth.month, uBirth.day, uBirth.hour + uBirth.minute/60 + uBirth.second/3600);

    const natalPos = calcPositions(jdBirth);
    const natalHouses = calcAllHouses(jdBirth, bLat, bLon);

    // Парс Фортуны
    if (natalPos.sun && natalPos.moon && !isNaN(natalHouses.asc)) {
      const sunH = houseOf(natalPos.sun.longitude, natalHouses.cusps);
      const isDay = sunH >= 7 && sunH <= 12;
      natalPos.pars_fortuna = { longitude: isDay ? norm(natalHouses.asc + natalPos.moon.longitude - natalPos.sun.longitude) : norm(natalHouses.asc + natalPos.sun.longitude - natalPos.moon.longitude), retrograde: false, speed: 0 };
    }
    natalPos.asc = { longitude: natalHouses.asc, isAngle: true };
    natalPos.mc = { longitude: natalHouses.mc, isAngle: true };
    natalPos.vertex = { longitude: natalHouses.vertex, isAngle: true };

    // ── Транзитные позиции ──
    const uTransit = localToUTC(tYear, tMonth, tDay, tHour, tMin, tTz);
    const jdTransit = sweJulday(uTransit.year, uTransit.month, uTransit.day, uTransit.hour + uTransit.minute/60 + uTransit.second/3600);
    const transitPos = calcPositions(jdTransit);

    // Транзитные Парс Фортуны
    // Локальные дома для транзитов (по городу транзита)
    let transitHouses = null;
    let hasLocalHouses = false;
    if (!isNaN(tLat) && !isNaN(tLon) && tLat && tLon) {
      transitHouses = calcAllHouses(jdTransit, tLat, tLon);
      hasLocalHouses = true;
      transitPos.asc = { longitude: transitHouses.asc, isAngle: true };
      transitPos.mc = { longitude: transitHouses.mc, isAngle: true };
      transitPos.vertex = { longitude: transitHouses.vertex, isAngle: true };
      // Транзитный Парс Фортуны
      if (transitPos.sun && transitPos.moon) {
        const tSunH = houseOf(transitPos.sun.longitude, transitHouses.cusps);
        const tIsDay = tSunH >= 7 && tSunH <= 12;
        transitPos.pars_fortuna = { longitude: tIsDay ? norm(transitHouses.asc + transitPos.moon.longitude - transitPos.sun.longitude) : norm(transitHouses.asc + transitPos.sun.longitude - transitPos.moon.longitude), retrograde: false, speed: 0 };
      }
    }

    // Кросс-аспекты
    const crossAsp = calcCrossAspects(transitPos, natalPos);

    // ── Рендер: таблица сопоставления ──
    renderComparisonTable(natalPos, transitPos, natalHouses, transitHouses, hasLocalHouses);
    renderAspectsTable(crossAsp, natalPos, natalHouses);
    renderHousesBlock(natalHouses, transitHouses, hasLocalHouses, birthCityVal, transitCityVal);
    renderTextOutput(natalPos, transitPos, natalHouses, transitHouses, hasLocalHouses, crossAsp, {
      nameVal, gender, bDate, bTime, tDate, tTime,
      birthTzAbbr: uBirth.tzAbbr, transitTzAbbr: uTransit.tzAbbr,
      birthCityVal, transitCityVal,
      bLat, bLon, tLat, tLon, bTz, tTz,
      uBirth, uTransit, jdBirth, jdTransit
    });

    document.getElementById('resultBlock').style.display = 'block';

    // Diagnostic bar
    const dBar = document.getElementById('diagBar');
    const ub = uBirth, ut = uTransit;
    dBar.innerHTML = [
      `<b>НАТАЛ:</b> ${bDate} ${bTime} | пояс: ${bTz} → ${ub.tzAbbr} (UTC${ub.utcOffset>=0?'+':''}${ub.utcOffset}) | UTC: ${ub.year}-${String(ub.month).padStart(2,'0')}-${String(ub.day).padStart(2,'0')} ${String(ub.hour).padStart(2,'0')}:${String(ub.minute).padStart(2,'0')} | JD: ${jdBirth.toFixed(4)} | ${bLat.toFixed(4)}°N ${bLon.toFixed(4)}°E`,
      `<b>ТРАНЗИТ:</b> ${tDate} ${tTime} | пояс: ${tTz} → ${ut.tzAbbr} (UTC${ut.utcOffset>=0?'+':''}${ut.utcOffset}) | UTC: ${ut.year}-${String(ut.month).padStart(2,'0')}-${String(ut.day).padStart(2,'0')} ${String(ut.hour).padStart(2,'0')}:${String(ut.minute).padStart(2,'0')} | JD: ${jdTransit.toFixed(4)} | ${!isNaN(tLat) ? tLat.toFixed(4)+'°N '+tLon.toFixed(4)+'°E' : '—'}`,
      `<b>AC натал:</b> ${fmtDeg(natalHouses.asc)} | <b>MC натал:</b> ${fmtDeg(natalHouses.mc)}` + (hasLocalHouses ? ` | <b>AC локал:</b> ${fmtDeg(transitHouses.asc)} | <b>MC локал:</b> ${fmtDeg(transitHouses.mc)}` : ''),
    ].join('<br>');
  } catch(e) {
    console.error(e);
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'РАССЧИТАТЬ';
  }
};

// ── Рендер: таблица-сопоставление (как на геокульт) ──
function renderComparisonTable(natalPos, transitPos, natalHouses, transitHouses, hasLocal) {
  const el = document.getElementById('comparisonTable');
  const allKeys = [...PLANET_ORDER, 'pars_fortuna', 'vertex'];

  let html = `<table class="result-table">
    <tr>
      <th></th>
      <th colspan="2" class="col-transit">Транзит</th>
      <th colspan="2" class="col-natal">Натал</th>
    </tr>
    <tr>
      <th>Планета</th>
      <th class="col-transit">Положение</th>
      <th class="col-transit">${hasLocal ? 'Лок.дом' : 'Нат.дом'}</th>
      <th class="col-natal">Положение</th>
      <th class="col-natal">Дом</th>
    </tr>`;

  for (const k of allKeys) {
    const tp = transitPos[k];
    const np = natalPos[k];
    if (!tp && !np) continue;

    const name = PLANET_NAMES[k] || k;

    // Transit
    let tDeg = '—', tHouse = '—', tRetro = '';
    if (tp && !isNaN(tp.longitude)) {
      tDeg = fmtDegShort(tp.longitude);
      if (tp.retrograde) tRetro = ' <span class="retro">R</span>';
      if (hasLocal && transitHouses) {
        tHouse = houseOf(tp.longitude, transitHouses.cusps);
      } else if (natalHouses) {
        tHouse = houseOf(tp.longitude, natalHouses.cusps);
      }
    }

    // Natal
    let nDeg = '—', nHouse = '—', nRetro = '';
    if (np && !isNaN(np.longitude)) {
      nDeg = fmtDegShort(np.longitude);
      if (np.retrograde) nRetro = ' <span class="retro">R</span>';
      if (natalHouses) nHouse = houseOf(np.longitude, natalHouses.cusps);
    }

    html += `<tr>
      <td>${name}</td>
      <td class="col-transit">${tDeg}${tRetro}</td>
      <td class="col-transit">${tHouse}</td>
      <td class="col-natal">${nDeg}${nRetro}</td>
      <td class="col-natal">${nHouse}</td>
    </tr>`;
  }

  // Углы
  const angles = [
    { key: 'asc', label: 'AC (Асц)' },
    { key: 'mc', label: 'MC (Сер.Неба)' },
  ];
  html += `<tr><td colspan="5" class="tbl-section">Углы</td></tr>`;
  for (const a of angles) {
    const tp = transitPos[a.key];
    const np = natalPos[a.key];
    let tDeg = '—', nDeg = '—';
    if (tp && !isNaN(tp.longitude)) tDeg = fmtDegShort(tp.longitude);
    if (np && !isNaN(np.longitude)) nDeg = fmtDegShort(np.longitude);
    html += `<tr>
      <td>${a.label}</td>
      <td class="col-transit">${hasLocal ? tDeg : '—'}</td>
      <td class="col-transit">—</td>
      <td class="col-natal">${nDeg}</td>
      <td class="col-natal">—</td>
    </tr>`;
  }

  html += `</table>`;
  el.innerHTML = html;
}

      if (hasLocal && transitHouses) tH = String(houseOf(tp.longitude, transitHouses.cusps));
      else tH = String(houseOf(tp.longitude, natalHouses.cusps));
    }
    let nStr = '—', nH = '—';
    if (np && !isNaN(np.longitude)) {
      nStr = fmtDeg(np.longitude) + (np.retrograde ? ' R' : '');
      nH = String(houseOf(np.longitude, natalHouses.cusps));
    }
    L.push(`${name}| ${tStr.padEnd(21)}${tH.padEnd(5)} | ${nStr.padEnd(21)}${nH}`);
  }

  // Аспекты
  L.push(''); L.push('────────── КРОСС-АСПЕКТЫ (ТРАНЗИТ → НАТАЛ, ≤1°) ──────────'); L.push('');
  if (!crossAsp.length) L.push('Аспектов не обнаружено');
  else crossAsp.forEach(a => {
    const tName = PLANET_NAMES_FULL[a.transit] || a.transit;
    const nName = PLANET_NAMES_FULL[a.natal] || a.natal;
    const nH = natalPos[a.natal] ? houseOf(natalPos[a.natal].longitude, natalHouses.cusps) : '';
    const hStr = nH ? ' (нат.дом ' + nH + ')' : '';
    L.push(`${tName} (Т) ${a.sym} ${a.type} ${nName} (Н)${hStr} — орб ${a.orb}°`);
  });

  // Дома
  L.push(''); L.push('────────── НАТАЛЬНЫЕ ДОМА ──────────'); L.push('');
  for (let i = 0; i < 12; i++) {
    const label = i === 0 ? '1 (AC)' : i === 9 ? '10 (MC)' : String(i+1);

    for (let i = 0; i < 12; i++) {
      const label = i === 0 ? '1 (AC)' : i === 9 ? '10 (MC)' : String(i+1);
      L.push(`${label.padEnd(8)} ${fmtDeg(transitHouses.cusps[i])}`);

  L.push(''); L.push('══════════════════════════════════════');

  document.getElementById('output').value = L.join('\n');
}

// ── РАСЧЁТ НА ПЕРИОД ──
window.calcPeriod = function() {
  const errEl = document.getElementById('error');
  errEl.textContent = '';
  if (!swe) { errEl.textContent = 'Swiss Ephemeris ещё загружается...'; return; }

  const btn = document.getElementById('calcBtn');
  btn.disabled = true; btn.textContent = 'РАСЧЁТ...';

  try {
    // Данные рождения
    const bDate = document.getElementById('birthDate').value;
    const bTime = document.getElementById('birthTime').value;
    const bLat = parseFloat(document.getElementById('birthLat').value);
    const bLon = parseFloat(document.getElementById('birthLon').value);
    const bTz = document.getElementById('birthTz').value;
    const nameVal = document.getElementById('name').value;

    // Период
    const startStr = document.getElementById('periodStart').value;
    const endStr = document.getElementById('periodEnd').value;
    const excludeMoon = document.getElementById('excludeMoon').checked;

    if (!bDate || !bTime || !bLat || !bLon || !bTz) throw new Error('Заполните все поля рождения.');
    if (!startStr || !endStr) throw new Error('Укажите начало и конец периода.');
    if (new Date(startStr) > new Date(endStr)) throw new Error('Начало периода должно быть раньше конца.');

    // Натал (один раз)
    const [bY, bM, bD] = bDate.split('-').map(Number);
    const [bH, bMin] = bTime.split(':').map(Number);
    const uBirth = localToUTC(bY, bM, bD, bH, bMin, bTz);
    const jdBirth = sweJulday(uBirth.year, uBirth.month, uBirth.day, uBirth.hour + uBirth.minute/60 + uBirth.second/3600);

    const natalPos = calcPositions(jdBirth);
    const natalHouses = calcAllHouses(jdBirth, bLat, bLon);

    // Парс Фортуны натальный
    if (natalPos.sun && natalPos.moon && !isNaN(natalHouses.asc)) {
      const sunH = houseOf(natalPos.sun.longitude, natalHouses.cusps);
      const isDay = sunH >= 7 && sunH <= 12;
      natalPos.pars_fortuna = { longitude: isDay ? norm(natalHouses.asc + natalPos.moon.longitude - natalPos.sun.longitude) : norm(natalHouses.asc + natalPos.sun.longitude - natalPos.moon.longitude), retrograde: false, speed: 0 };
    }
    natalPos.asc = { longitude: natalHouses.asc, isAngle: true };
    natalPos.mc = { longitude: natalHouses.mc, isAngle: true };
    natalPos.vertex = { longitude: natalHouses.vertex, isAngle: true };

    // Цикл по дням
    let currentDate = new Date(startStr);
    const endDate = new Date(endStr);
    const ongoingPeriods = {};
    const completedPeriods = [];

    const fmtD = (d) => d.toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric'});

    while (currentDate <= endDate) {
      const jdT = sweJulday(currentDate.getFullYear(), currentDate.getMonth() + 1, currentDate.getDate(), 12.0);
      const transitPos = calcPositions(jdT);
      const crossAsp = calcCrossAspects(transitPos, natalPos);

      const todaysKeys = new Set();

      crossAsp.forEach(a => {
        if (excludeMoon && a.transit === 'moon') return;

        const aspectId = `${a.transit}_${a.type}_${a.natal}`;
        todaysKeys.add(aspectId);

        const tName = PLANET_NAMES[a.transit] || a.transit;
        const nName = PLANET_NAMES_INSTR[a.natal] || a.natal;
        const aspText = ASPECT_TEXT[a.type] || a.type;
        const nDeg = fmtDegShort(natalPos[a.natal].longitude);
        const nH = natalPos[a.natal] ? houseOf(natalPos[a.natal].longitude, natalHouses.cusps) : '';

        const line = `тр. ${tName} ${aspText} нат. ${nName} (${nDeg}, дом ${nH})`;

        if (!ongoingPeriods[aspectId]) {
          ongoingPeriods[aspectId] = {
            text: line,
            transit: a.transit,
            start: new Date(currentDate),
            end: new Date(currentDate),
            minOrb: Math.abs(parseFloat(a.orb)),
            exactDate: new Date(currentDate)
          };
        } else {
          ongoingPeriods[aspectId].end = new Date(currentDate);
          const orbVal = Math.abs(parseFloat(a.orb));
          if (orbVal < ongoingPeriods[aspectId].minOrb) {
            ongoingPeriods[aspectId].minOrb = orbVal;
            ongoingPeriods[aspectId].exactDate = new Date(currentDate);
          }
        }
      });

      // Закрываем аспекты, которых сегодня нет
      for (const key in ongoingPeriods) {
        if (!todaysKeys.has(key)) {
          completedPeriods.push(ongoingPeriods[key]);
          delete ongoingPeriods[key];
        }
      }

      currentDate.setDate(currentDate.getDate() + 1);
    }

    // Закрываем оставшиеся
    for (const key in ongoingPeriods) completedPeriods.push(ongoingPeriods[key]);

    // Сортировка: по дате начала, потом по скорости планеты (медленные первые)
    const speedOrder = { pluto:0, neptune:1, uranus:2, chiron:3, saturn:4, jupiter:5, mars:6, venus:7, sun:8, mercury:9, north_node:10, south_node:11, lilith:12, selena:13, moon:14 };
    completedPeriods.sort((a, b) => {
      const d = a.start - b.start;
      if (d !== 0) return d;
      return (speedOrder[a.transit] || 99) - (speedOrder[b.transit] || 99);
    });

    // Сборка текста
    const L = [];
    L.push('══════════ ТРАНЗИТЫ НА ПЕРИОД ══════════');
    L.push('');
    if (nameVal) L.push('Имя: ' + nameVal);
    L.push('Дата рождения: ' + bDate + ', ' + bTime);
    L.push('Период: ' + fmtD(new Date(startStr)) + ' — ' + fmtD(endDate));
    if (excludeMoon) L.push('(без транзитной Луны)');
    L.push('');
    L.push('──────────────────────────────────────────');
    L.push('');

    if (!completedPeriods.length) {
      L.push('Активных транзитных аспектов не обнаружено.');
    } else {
      completedPeriods.forEach(p => {
        L.push(p.text);
        const startS = fmtD(p.start);
        const endS = fmtD(p.end);
        const peakS = fmtD(p.exactDate);
        if (startS === endS) {
          L.push(`   ${startS} | ПИК: ${peakS} | орб ${p.minOrb.toFixed(2)}°`);
        } else {
          L.push(`   С ${startS} по ${endS} | ПИК: ${peakS} | орб ${p.minOrb.toFixed(2)}°`);
        }
        L.push('──────────────────────────────────────────');
      });
    }

    L.push('');
    L.push('══════════════════════════════════════════');

    document.getElementById('output').value = L.join('\n');
    document.getElementById('resultBlock').style.display = 'block';

    // Скрываем таблицы — показываем только текст
    document.getElementById('comparisonTable').style.display = 'none';
    document.getElementById('aspectsTable').style.display = 'none';
    document.getElementById('housesBlock').style.display = 'none';
    document.getElementById('diagBar').innerHTML = `<b>ПЕРИОД:</b> ${fmtD(new Date(startStr))} — ${fmtD(endDate)} | Найдено аспектов: ${completedPeriods.length}`;

  } catch(e) {
    console.error(e);
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'РАССЧИТАТЬ';
  }
};

window.copyText = function() {
  const ta = document.getElementById('output');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Скопировано'; btn.className = 'copy-btn copied';
    setTimeout(() => { btn.textContent = '⎘ Копировать'; btn.className = 'copy-btn'; }, 2500);
  });
};

// ── Поиск города (универсальный) ──
function setupCitySearch(inputId, latId, lonId, tzId) {
  const input = document.getElementById(inputId);
  let tid;
  input.addEventListener('input', function() {
    clearTimeout(tid); closeAllLists();
    const val = this.value; if (!val || val.length < 2) return;
    tid = setTimeout(async () => {
      try {
        const resp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(val)}&count=5&language=ru&format=json`);
        const data = await resp.json(); if (!data.results) return;
        const list = document.createElement('DIV'); list.className = 'autocomplete-items';
        input.parentNode.appendChild(list);
        data.results.forEach(city => {
          const item = document.createElement('DIV');
          const region = city.admin1 ? `, ${city.admin1}` : '';
          const country = city.country ? ` (${city.country})` : '';
          const tz = city.timezone || 'UTC';
          item.innerHTML = `<span class="city-name">${city.name}</span><span class="city-region">${region}${country}</span><span class="city-tz">${tz}</span>`;
          item.addEventListener('click', () => {
            input.value = city.name;
            document.getElementById(latId).value = city.latitude;
            document.getElementById(lonId).value = city.longitude;
            document.getElementById(tzId).value = tz;
            closeAllLists();
          });
          list.appendChild(item);
        });
      } catch(e) { console.error(e); }
    }, 400);
  });
}
function closeAllLists() { document.querySelectorAll('.autocomplete-items').forEach(el => el.remove()); }
document.addEventListener('click', closeAllLists);

setupCitySearch('birthCity', 'birthLat', 'birthLon', 'birthTz');
setupCitySearch('transitCity', 'transitLat', 'transitLon', 'transitTz');

initSWE();
</script>
